version: v1.0
name: release-version
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - |
          if [ -n "$TARGET_BRANCH" ]; then
            git fetch origin "$TARGET_BRANCH:$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
          else
            git fetch --all
          fi
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA=$(git rev-parse HEAD)
          fi
          git checkout "$COMMIT_SHA"
      - . vault-setup

blocks:
  - name: "Parameter Verification"
    dependencies: []
    task:
      jobs:
        - name: "Parameter Verification"
          commands:
            # Store the base release name (either passed from the Semaphore task parameters or from
            # plugin.xml) to use later for cleaning up old prereleases, then append date/commit
            # info to the final release name if this is a prerelease
            - |
              if [ -n "$RELEASE_NAME" ] && [ "$RELEASE_NAME" != "RELEASE_NAME" ]; then
                echo "Using provided RELEASE_NAME: $RELEASE_NAME"
              else
                VERSION=$(grep '<version>' resources/META-INF/plugin.xml | sed -E 's/.*<version>([^<]*)<\/version>.*/\1/' | xargs)
                echo "Extracted version from plugin.xml: $VERSION"
                RELEASE_NAME="v$VERSION"
              fi
              BASE_RELEASE_NAME=$RELEASE_NAME
              if [ "$IS_PRERELEASE" = "true" ]; then
                JOB_RUN_DATE=$(date -u +%Y%m%d)
                RELEASE_NAME="${RELEASE_NAME}-${JOB_RUN_DATE}-${COMMIT_SHA:0:8}-pre"
              fi
            - echo "$BASE_RELEASE_NAME" > BASE_RELEASE_NAME.txt
            - artifact push workflow BASE_RELEASE_NAME.txt --force
            - echo "$RELEASE_NAME" > RELEASE_NAME.txt
            - artifact push workflow RELEASE_NAME.txt --force
  - name: "Delete GitHub Release and Tag"
    dependencies: ["Parameter Verification"]
    task:
      jobs:
        - name: "Delete GitHub Release and Tag"
          commands:
            - artifact pull workflow BASE_RELEASE_NAME.txt
            - BASE_RELEASE_NAME=$(cat BASE_RELEASE_NAME.txt)
            - artifact pull workflow RELEASE_NAME.txt
            - RELEASE_NAME=$(cat RELEASE_NAME.txt)
            - |
              echo "Deleting all prerelease versions matching base: $BASE_RELEASE_NAME"
              gh release list --limit 100 | grep "^${BASE_RELEASE_NAME}-" | awk '{print $1}' | while read -r release_tag; do
                echo "Deleting release: $release_tag"
                gh release delete "$release_tag" --yes || true
                git tag -d "$release_tag" || true
                git push origin --delete "$release_tag" || true
              done
              if [ "$IS_PRERELEASE" != "true" ]; then
                echo "Deleting existing release matching: $RELEASE_NAME"
                gh release delete "$RELEASE_NAME" --yes || true
                git tag -d "$RELEASE_NAME" || true
                git push origin --delete "$RELEASE_NAME" || true
              fi
  - name: "Create GitHub Release and Tag"
    dependencies: ["Delete GitHub Release and Tag"]
    task:
      jobs:
        - name: "Create GitHub Release and Tag"
          commands:
            - artifact pull workflow RELEASE_NAME.txt
            - RELEASE_NAME=$(cat RELEASE_NAME.txt)
            # Try to determine previous release tag for generating release notes
            - |
              if [ -n "$PREVIOUS_RELEASE_TAG" ] && [ "$PREVIOUS_RELEASE_TAG" != "PREVIOUS_RELEASE_TAG" ]; then
                PREV_TAG="$PREVIOUS_RELEASE_TAG"
                echo "Using provided PREVIOUS_RELEASE_TAG: $PREV_TAG"
                NOTES_FLAGS="--generate-notes --notes-start-tag $PREV_TAG"
              else
                echo "Looking up the latest non-prerelease GitHub release tag..."
                RELEASES_URL="https://api.github.com/repos/confluentinc/intellij/releases"
                PREV_TAG=$(curl -s ${RELEASES_URL} | jq -r '.[] | select(.prerelease == false) | .tag_name' | head -n 1)
                if [ -z "$PREV_TAG" ]; then
                  echo "No previous non-prerelease tag found. Skipping automatic release notes generation."
                  NOTES_FLAGS=""
                else
                  echo "Found previous release tag: $PREV_TAG"
                  NOTES_FLAGS="--generate-notes --notes-start-tag $PREV_TAG"
                fi
              fi
            # Create the GitHub (pre)release, possibly with automatically-generated notes
            - |
              if [ "$IS_PRERELEASE" = "true" ]; then
                PRE_RELEASE_FLAG="--prerelease"
              else
                PRE_RELEASE_FLAG=""
              fi
            - |
              gh release create "$RELEASE_NAME" \
                $PRE_RELEASE_FLAG \
                --target "$COMMIT_SHA" \
                --title "$RELEASE_NAME" \
                $NOTES_FLAGS
  - name: "Build Plugin Zip"
    dependencies: ["Create GitHub Release and Tag"]
    task:
      prologue:
        commands:
          - make setup-sdk
          - . scripts/get-secrets.sh
          - make ci-sem-cache-restore
      jobs:
        - name: "Build IntelliJ Plugin"
          commands:
            - artifact pull workflow RELEASE_NAME.txt
            - RELEASE_NAME=$(cat RELEASE_NAME.txt)
            - export RELEASE_NAME
            - make build-plugin
            # Only one plugin zip should be created, unlike the VS Code extension that creates multiple .vsix files
            - PLUGIN_ZIP=$(find build/distributions/ -name "*.zip" | head -1)
            - |
              if [ -z "$PLUGIN_ZIP" ]; then
                echo "Error: Plugin .zip not found in build/distributions/"
                ls -la build/distributions/ 2>&1 || echo "build/distributions/ directory does not exist"
                exit 1
              fi
            - artifact push workflow ${PLUGIN_ZIP} --destination plugin-zip/intellij-${RELEASE_NAME}.zip --force
      epilogue:
        always:
          commands:
            - make ci-sem-cache-store
  - name: "Upload Plugin to GitHub Release"
    dependencies: ["Build Plugin Zip"]
    task:
      jobs:
        - name: "Upload Plugin to GitHub Release"
          commands:
            - artifact pull workflow RELEASE_NAME.txt
            - RELEASE_NAME=$(cat RELEASE_NAME.txt)
            - artifact pull workflow plugin-zip/
            - PLUGIN_ZIP=$(find plugin-zip/ -name "*.zip" | head -1)
            - gh release upload "$RELEASE_NAME" "$PLUGIN_ZIP" --clobber
