# This file is managed by ServiceBot plugin - Semaphore. The content in this file is created using a common
# template and configurations in service.yml.
# Any modifications made to version, name, agent and global_job_config will be overwritten by the generated
# content in nightly runs. Code changes made to the remaining sections will not be affected.
# For more information, please refer to the page:
# https://confluentinc.atlassian.net/wiki/spaces/Foundations/pages/2871296194/Add+SemaphoreCI
version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      # - make show-args
      - . vault-setup --version v3 --role frontend-vault
      - . scripts/get-secrets.sh
      - make ci-sem-cache-restore
      - make setup-sdk
  epilogue:
    always:
      commands:
        # - make epilogue-ci
        - make store-test-results-to-semaphore
        - make ci-sem-cache-store

blocks:
  - name: "Build, Test, Release"
    run:
      # don't run the build or unit tests on non-functional changes...
      when: "change_in('/', {exclude: ['/.deployed-versions/', '.github/'], default_branch: 'main'})"
    task:
      epilogue:
        always:
          commands:
            - sem-version java 17
            - emit-sonarqube-data --run_only_sonar_scan --enable_sonarqube_enterprise
      jobs:
        - name: "Build, Test, Release"
          commands:
            - make build
            - make test

after_pipeline:
  task:
    jobs:
      - name: Publish Test Results to Semaphore
        commands:
          - test-results gen-pipeline-report || echo "Could not publish pipeline test result report due to probably no test results to publish"

promotions:
  - name: Third Party Notices
    pipeline_file: third-party-notices.yml
    auto_promote:
      when: "branch =~ '.*' and change_in(['/build.gradle.kts', '/gradle/libs.versions.toml'], {default_branch: 'main', branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE', pipeline_file: 'ignore'})"
