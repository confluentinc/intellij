<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            background: #ffffff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            position: sticky;
            top: 0;
            background: #f5f5f5;
            z-index: 10;
        }
        th {
            padding: 8px;
            text-align: left;
            font-weight: 500;
            border-bottom: 1px solid #e0e0e0;
        }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #f0f0f0;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover {
            background: #f7f7f7;
        }
        tr.selected {
            background: #cce5ff !important;
        }
        .loading {
            padding: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Topic</th>
                <th>Timestamp</th>
                <th>Key</th>
                <th>Value</th>
                <th>Partition</th>
                <th>Offset</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="loading" class="loading" style="display: none;">Loading...</div>

    <script>
        let records = [];
        let selectedIndex = -1;
        let maxRows = 0;

        // Called from Kotlin
        window.receiveRows = function(newRows) {
            records.push(...newRows);

            // Enforce max rows
            if (maxRows > 0 && records.length > maxRows) {
                records = records.slice(-maxRows);
            }

            renderTable();
        };

        window.replaceRows = function(newRows) {
            records = newRows;
            selectedIndex = -1;
            renderTable();
        };

        window.setMaxRows = function(limit) {
            maxRows = limit;
        };

        window.clearRows = function() {
            records = [];
            selectedIndex = -1;
            renderTable();
        };

        window.setLoading = function(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
        };

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (records.length === 0) {
                return;
            }

            records.forEach((record, index) => {
                const row = tbody.insertRow();
                row.className = index === selectedIndex ? 'selected' : '';
                row.onclick = () => selectRow(index);

                row.insertCell().textContent = record.topic;
                row.insertCell().textContent = formatTimestamp(record.timestamp);
                row.insertCell().textContent = record.key || '(null)';
                row.insertCell().textContent = record.value || '(null)';
                row.insertCell().textContent = record.partition;
                row.insertCell().textContent = record.offset;
            });
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString();
        }

        function selectRow(index) {
            selectedIndex = index;
            renderTable();

            // Send to Kotlin - will be injected by JBCefJSQuery
            // The actual cefQuery call will be injected at runtime
            const message = 'ROW_SELECT:' + index;
            if (window.cefQuery) {
                window.cefQuery({
                    request: message,
                    onSuccess: function() {},
                    onFailure: function() {}
                });
            }
        }
    </script>
</body>
</html>
