migration.notification.multiversion.content=Each IDE version (e.g., 2025.1, 2025.2, 2025.3) has its own settings folder. \
  To manually transfer connections between IDE versions:\
  <ol>\
    <li>In the source IDE, go to <b>File -> Manage IDE Settings -> Export Settings</b></li>\
    <li>Select <b>Big Data Tools Connection Settings</b> and save the .zip file</li>\
    <li>In the target IDE, go to <b>File -> Manage IDE Settings -> Import Settings</b></li>\
    <li>Select the exported .zip file to import your connections</li>\
  </ol>
