        <li>Sign in to your AWS account and select your MSK cluster.</li>\
        <li>Click <b>View client information</b> and copy the contents of <b>Public endpoint</b>.</li>\
        <li>Paste them to the <b>Bootstrap servers</b> field of the Kafka connection in your IDE.</li>\
    </ol>
