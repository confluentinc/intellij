settings.confluent.setup.desc=\
    <ol>\
        <li>Open <b>https://confluent.cloud/home</b></li>\
        <li>Select a Kafka cluster</li>\
        <li>Navigate to Clients and click on <b>Add new client</b></li>\
        <li>Select <b>Java</b> as language</li>\
        <li>Provide your API keys or generate new ones</li>\
        <li>Select a topic or create a new one</li>\
        <li>Click on <b>Download</b></li>\
        <li>Unpack the zip archive and copy the contents of the file <b>client.properties</b> to the field <b>Configuration</b></li>\
    </ol>
settings.msk.setup.desc=\
    <ol>\
        <li>Sign in to your AWS account and select your MSK cluster.</li>\
        <li>Click <b>View client information</b> and copy the contents of <b>Public endpoint</b>.</li>\
        <li>Paste them to the <b>Bootstrap servers</b> field of the Kafka connection in your IDE.</li>\
    </ol>
