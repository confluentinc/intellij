<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    :root {
        --bg: #ffffff;
        --bg-header: #f5f5f5;
        --text: #1e1e1e;
        --border: #d4d4d4;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #2b2d30;
            --bg-header: #313335;
            --text: #bbbbbb;
            --border: #444444;
        }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        overflow: hidden;
    }
    .table-container { width: 100%; height: 100vh; overflow: auto; position: relative; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 2; }
    thead th {
        background: var(--bg-header);
        font-weight: 600;
        text-align: left;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    tbody tr {
        height: 25px;
        border-bottom: 1px solid var(--border);
    }
    tbody tr.spacer { border-bottom: none; }
    tbody td {
        padding: 4px 10px;
        height: 25px;
        line-height: 17px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    tbody tr.error-row td { color: #c0392b; }
</style>
</head>
<body>
<div class="table-container" id="tableContainer">
    <table id="dataTable">
        <thead id="tableHead"><tr></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
(function() {
    "use strict";

    var ROW_HEIGHT = 25;
    var BUFFER = 30;

    var columns = [];
    var allRecords = [];
    var visibleStart = -1;
    var visibleEnd = -1;
    var scrollRAF = null;

    var tableContainer = document.getElementById("tableContainer");
    var tableBody = document.getElementById("tableBody");
    var tableHead = document.getElementById("tableHead").querySelector("tr");

    function createCell(text) {
        var td = document.createElement("td");
        td.textContent = text != null ? String(text) : "";
        return td;
    }

    function createSpacerRow(height) {
        if (height <= 0) return null;
        var tr = document.createElement("tr");
        tr.classList.add("spacer");
        var td = document.createElement("td");
        td.style.height = height + "px";
        td.style.padding = "0";
        td.style.border = "none";
        td.colSpan = columns.length || 1;
        tr.appendChild(td);
        return tr;
    }

    function renderVisibleRows() {
        var scrollTop = tableContainer.scrollTop;
        var viewportHeight = tableContainer.clientHeight;

        // Account for sticky header height
        var headerHeight = tableHead.parentElement ? tableHead.parentElement.offsetHeight : 0;
        var effectiveViewport = viewportHeight - headerHeight;

        var firstVisible = Math.floor(scrollTop / ROW_HEIGHT);
        var visibleCount = Math.ceil(effectiveViewport / ROW_HEIGHT);
        var lastVisible = firstVisible + visibleCount;

        var start = Math.max(0, firstVisible - BUFFER);
        var end = Math.min(allRecords.length, lastVisible + BUFFER);

        if (start === visibleStart && end === visibleEnd) return;
        visibleStart = start;
        visibleEnd = end;

        tableBody.innerHTML = "";

        // Top spacer
        var topSpacer = createSpacerRow(start * ROW_HEIGHT);
        if (topSpacer) tableBody.appendChild(topSpacer);

        // Visible rows
        var fragment = document.createDocumentFragment();
        for (var i = start; i < end; i++) {
            var record = allRecords[i];
            var tr = document.createElement("tr");
            if (record.isError) tr.classList.add("error-row");
            tr.setAttribute("data-index", i);
            for (var c = 0; c < columns.length; c++) {
                tr.appendChild(createCell(record[columns[c]]));
            }
            fragment.appendChild(tr);
        }
        tableBody.appendChild(fragment);

        // Bottom spacer
        var bottomSpacer = createSpacerRow((allRecords.length - end) * ROW_HEIGHT);
        if (bottomSpacer) tableBody.appendChild(bottomSpacer);
    }

    tableContainer.addEventListener("scroll", function() {
        if (scrollRAF) return;
        scrollRAF = requestAnimationFrame(function() {
            scrollRAF = null;
            renderVisibleRows();
        });
    });

    function reportAfterPaint(operation, count, t0) {
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                var t1 = performance.now();
                if (window.__perfCallback) {
                    window.__perfCallback(JSON.stringify({
                        operation: operation,
                        rowCount: count,
                        totalRows: allRecords.length,
                        durationMs: t1 - t0
                    }));
                }
            });
        });
    }

    window.initColumns = function(cols) {
        columns = cols;
        tableHead.innerHTML = "";
        for (var i = 0; i < cols.length; i++) {
            var th = document.createElement("th");
            th.textContent = cols[i];
            tableHead.appendChild(th);
        }
    };

    window.addRows = function(base64Data) {
        var t0 = performance.now();
        var records = JSON.parse(atob(base64Data));

        for (var i = 0; i < records.length; i++) {
            allRecords.push(records[i]);
        }

        // Force re-render of visible portion
        visibleStart = -1;
        visibleEnd = -1;
        renderVisibleRows();

        reportAfterPaint("addRows", records.length, t0);
    };

    window.replaceAllRows = function(base64Data) {
        var t0 = performance.now();
        var records = JSON.parse(atob(base64Data));

        allRecords = records;
        visibleStart = -1;
        visibleEnd = -1;
        tableContainer.scrollTop = 0;
        renderVisibleRows();

        reportAfterPaint("replaceAllRows", records.length, t0);
    };

    window.clearTable = function() {
        var t0 = performance.now();
        allRecords = [];
        tableBody.innerHTML = "";
        visibleStart = -1;
        visibleEnd = -1;
        reportAfterPaint("clearTable", 0, t0);
    };

    window.clearTableSilent = function() {
        allRecords = [];
        tableBody.innerHTML = "";
        visibleStart = -1;
        visibleEnd = -1;
    };
})();
</script>
</body>
</html>
