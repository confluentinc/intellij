name: 'Report a documentation issue'
description: Report an issue with the Confluent for JetBrains IDEs documentation.
title: 'Docs: '
labels:
  - 'documentation'
  - 'needs triage'
body:
  - type: markdown
    attributes:
      value: |
        Before opening a new documentation issue, is this something you can help us with? Your contributions are welcomed and appreciated.
  - type: markdown
    attributes:
      value: Thank you for helping us update our docs!
  - type: textarea
    attributes:
      label: What is the documentation issue?
      description: 'Example: There is incorrect or stale information about a configuration option.'
    validations:
      required: true
  - type: textarea
    attributes:
      label: Is there any context that might help us understand?
      description: A clear description of any added context that might help us understand.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
  - type: input
    attributes:
      label: Does the docs page already exist? Please link to it.
      description: 'Example: https://docs.confluent.io/...'
    validations:
      required: false
