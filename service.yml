name: intellij
lang: unknown
lang_version: unknown
git:
  enable: true
codeowners:
  enable: true
make:
  enable: true
renovatebot:
  enable: true
  automerge:
    enable: false
semaphore:
  enable: true
  pipeline_enable: false
  tasks:
    - name: release-version
      branch: main
      pipeline_file: ".semaphore/release-version.yml"
      parameters:
        - name: IS_PRERELEASE
          required: true
          options:
            - "true"
            - "false"
          default_value: "true"
          description: |
            Whether the release is a pre-release (true/false)
        - name: TARGET_BRANCH
          required: true
          default_value: "main"
          description: The target branch to create the release from, must be a valid branch.
        - name: RELEASE_NAME
          required: true
          description: |
            The name of the GitHub Release (and tag) to create (e.g., 'vX.Y.Z'). NOTE: Do not include '-pre' suffixes for prereleases; instead, set the IS_PRERELEASE parameter to true and it will be added automatically.
        - name: COMMIT_SHA
          required: true
          description: |
            The commit SHA to create the release and tag from, must be a valid SHA/tag/branch.
        - name: PREVIOUS_RELEASE_TAG
          required: false
          description: |
            The previous release tag (e.g., 'v0.1.0') to compare against when generating release notes. If not provided, will use the latest (non-prerelease) GitHub Release.
  managed_sections:
    - version
    - name
    - agent
    - global_job_config
sonarqube:
  enable: true
  languages:
    - java
    - kotlin
  coverage_reports:
    - "**/jacocoTestReport.xml"
  coverage_sources:
    - "src"
  coverage_exclusions:
    - "**/test/**/*"
    - "**/tests/**/*"
    - "**/mock/**/*"
    - "**/mocks/**/*"
    - "**/*mock*"
    - "**/*test*"
    - "gen/**/*"
  main_branch: main
